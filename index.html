    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at center,rgba(100,160,255,.05),transparent 70%);pointer-events:none}

    /* Canvas tuyết phía sau két */
    #snow-back{position:fixed;inset:0;z-index:0;pointer-events:none}
    /* Canvas tuyết phía trước két */
    #snow-front{position:fixed;inset:0;z-index:10;pointer-events:none}
    .screen{display:none;width:100%;min-height:100vh;justify-content:center;align-items:flex-end;flex-direction:column;position:relative;z-index:5}
    .screen.active{display:flex}
    #safe-screen{ align-items:center; justify-content:center; padding-bottom:9vh; margin-left:0; margin-right:100vw; }
    /* KÉT SẮT MỚI */
    .safe-wrapper{ width:1200px; max-width:95vw; animation:riseUp 1.2s cubic-bezier(.22,1,.36,1) forwards; position:relative; }
    .safe-wrapper::after{ display:none; }
    @keyframes riseUp{
      0%{ transform:translateY(140px); opacity:0; }
      30%{ opacity:1; }
      100%{ transform:translateY(0); opacity:1; }
    }
    .safe-wrapper svg{ display:block; width:100%; height:auto; overflow:visible; cursor:pointer; }
    #door{
      transform-origin:185px 113px;
      transform:perspective(700px) rotateX(0deg);
      transition:transform 0.8s cubic-bezier(.3,.9,.3,1) .3s;
    }
    .safe-wrapper.open #door{ transform:perspective(700px) rotateX(-110deg); }
    #interiorGlow{ opacity:0; transition:opacity .5s ease .85s; }
    .safe-wrapper.open #interiorGlow{ opacity:1; }
    .coin{ animation:sparkle 1.6s ease-in-out infinite; transform-origin:center; }
    #c2{ animation-delay:.4s; }
    #c3{ animation-delay:.8s; }
    .led{ fill:#2c3f30; opacity:.5; transition:fill .25s ease,opacity .25s ease; }
    .safe-wrapper.open #led1{ fill:#4ee08a; opacity:1; transition-delay:.05s; }
    .safe-wrapper.open #led2{ fill:#4ee08a; opacity:1; transition-delay:.15s; }
    .safe-wrapper.open #led3{ fill:#4ee08a; opacity:1; transition-delay:.25s; }
    .safe-wrapper.open #led4{ fill:#4ee08a; opacity:1; transition-delay:.35s; }
    .key{ fill:#3d4045; stroke:#1c1d20; stroke-width:1; }
    @keyframes sparkle{
      0%,100%{ opacity:.3; transform:translateY(0) scale(.8); }
      50%{ opacity:1; transform:translateY(-4px) scale(1.15); }
    }
    .safe-letter-svg{
      cursor:pointer;
      pointer-events:none;
      position:absolute;
      bottom:52%;
      left:50%;
      width:90px;
      transform:translateX(-50%) translateY(60px) scale(0.3);
      opacity:0;
      transition:
        transform 1.2s cubic-bezier(.22,1,.36,1),
        opacity 1.2s ease;
    }
    .safe-letter-svg.show{
      pointer-events:auto;
      transform:translateX(-50%) translateY(0px) scale(1);
      opacity:1;
    }
    @keyframes letterFloat{
      0%,100%{ transform:translateY(0px); }
      50%{ transform:translateY(-6px); }
    }
    /* MODAL MẬT KHẨU */
    .password-overlay{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      z-index:50;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(4px);
    }
    .password-overlay.show{ display:flex; }
    .password-box{
      background:#1a2a3a;
      border:1px solid rgba(100,160,255,0.2);
      border-radius:20px;
      padding:36px 32px;
      width:min(420px,92vw);
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
      animation:popIn .3s cubic-bezier(.22,1,.36,1);
    }
    @keyframes popIn{
      from{opacity:0;transform:scale(0.92) translateY(20px)}
      to{opacity:1;transform:scale(1) translateY(0)}
    }
    .password-box h2{color:#a8c8f0;font-size:18px;font-weight:500;margin-bottom:24px;letter-spacing:1px}
    .pin-container{display:flex;justify-content:center;gap:12px;margin-bottom:18px}
    .pin{width:54px;height:62px;border-radius:12px;background:#0f1e2d;border:2px solid #2a4a6a;color:#a8c8f0;font-size:26px;display:flex;justify-content:center;align-items:center;transition:.25s}
    .pin.filled{border-color:#4a90d9;box-shadow:0 0 12px rgba(74,144,217,.4)}
    .pin.error{border-color:#ff6666;animation:shake .4s}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
    .hint{height:20px;color:#ff8080;font-size:13px;opacity:0;transition:.3s;margin-bottom:12px}
    .hint.show{opacity:1}
    .keypad{display:grid;grid-template-columns:repeat(3,70px);gap:12px;justify-content:center;margin-top:8px}
    .keypad button{height:60px;border:none;border-radius:14px;cursor:pointer;font-size:22px;background:#0f1e2d;color:#a8c8f0;border:1px solid #1e3a52;transition:.2s;font-family:Arial,sans-serif}
    .keypad button:hover{background:#1a3550;border-color:#4a90d9;transform:translateY(-2px)}
    .keypad button:active{transform:scale(.95)}
    .keypad .empty{visibility:hidden}

    /* ENVELOPE MỚI */
    .letter-wrapper{
      display:flex;
      justify-content:center;
      align-items:center;
      width:100%;
      min-height:100vh;
      position:relative;
    }
    .wrapper{
      height:200px;
      width:300px;
      background-color:#3760C9;
      position:absolute;
      bottom:60px;
      display:flex;
      justify-content:center;
      z-index:0;
      cursor:pointer;
    }
    .lid{
      position:absolute;
      height:100%;
      width:100%;
      top:0;left:0;
      border-right:150px solid transparent;
      border-bottom:100px solid transparent;
      border-left:150px solid transparent;
      transform-origin:top;
      transition:transform 0.25s linear;
    }
    .lid.one{
      border-top:100px solid #658ced;
      transform:rotateX(0deg);
      z-index:3;
      transition-delay:0.75s;
    }
    .lid.two{
      border-top:100px solid #3760C9;
      transform:rotateX(90deg);
      z-index:1;
      transition-delay:0.5s;
    }
    .env-body{
      position:absolute;
      height:100%;width:100%;
      top:0;left:0;
      border-top:100px solid transparent;
      border-right:150px solid #C4DFF0;
      border-bottom:100px solid #C4DFF0;
      border-left:150px solid #a4d4f2;
      z-index:3;
    }
    .letter{
      position:fixed;
      top:50%;
      left:50%;
      width:min(420px, 92vw);
      height:85vh;
      background-color:white;
      border-radius:16px;
      z-index:100;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
      /* trạng thái ban đầu: ẩn trong phong bì */
      transform:translate(-50%, 120vh);
      opacity:0;
      transition:transform 0.6s cubic-bezier(.22,1,.36,1), opacity 0.3s;
      pointer-events:none;
    }
    .wrapper.open .letter{
      transform:translate(-50%, -50%);
      opacity:1;
      transition-delay:0.5s;
      pointer-events:auto;
    }
    .letter-inner{
  padding:16px 18px;
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
    .letter p{
      text-align:center;
      font-size:18px;
      margin-top:10px;
      color:#3B4049;
      font-family:'Comic Sans MS',cursive;
      font-size:20px;
      line-height:28px;
      white-space:pre-line;
    }
    .letter-footer-inner{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:8px 14px;
      border-top:1px solid #eee;
    }
    #lottie-box{
      transition: opacity 1s ease;
      filter: grayscale(60%) brightness(1.1) contrast(0.95) hue-rotate(180deg) saturate(0.4);
    }
    #lottie-box.fade-out{
      opacity: 0;
    }
    #next-button{
      border:none;padding:7px 18px;border-radius:20px;
      background:#2b1f11;color:white;cursor:pointer;
      opacity:0;pointer-events:none;transition:.35s;
      font-family:'Comic Sans MS',cursive;font-size:16px;
    }
    #next-button.show{opacity:1;pointer-events:auto}
    #next-button:hover{transform:translateY(-2px)}

    /* Khi hover hoặc class open */
    .wrapper.open .lid.one{transform:rotateX(90deg);transition-delay:0s}
    .wrapper.open .lid.two{transform:rotateX(180deg);transition-delay:0.25s}

    .cursor{display:inline-block;width:2px;height:20px;background:#3B4049;animation:blink .7s infinite;vertical-align:middle}
    @keyframes blink{50%{opacity:0}}
    .finish-box{text-align:center}
    .finish-emoji{font-size:60px;animation:bounce .9s infinite alternate}
    @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
    .finish-box h1{color:var(--gold2);margin:15px 0;font-family:'Comic Sans MS',cursive;font-size:42px}
    .finish-box p{color:#d5b267}

  
  </style>
</head>
<body>

<canvas id="snow-back"></canvas>
<canvas id="snow-front"></canvas>

<div class="screen active" id="safe-screen">
  <div class="safe-wrapper" id="safe-wrapper">

let pin="",unlocked=false,openedLetter=false,currentPage=0,typing=false,typingIndex=0,typingTimer=null,fullText="";

window.onload=function(){
  const now=new Date();
  document.getElementById("today-date").innerText=
    now.getDate().toString().padStart(2,"0")+"/"+(now.getMonth()+1).toString().padStart(2,"0")+"/"+now.getFullYear();
}

function pressNum(n){
  if(unlocked||pin.length>=4)return;
  pin+=n;updatePin();
  if(pin.length==4)setTimeout(checkPassword,200);
}
function deleteLast(){if(unlocked||pin.length==0)return;pin=pin.slice(0,-1);updatePin()}
function updatePin(){
  for(let i=0;i<4;i++){
    const b=document.getElementById("pin"+i);
    if(i<pin.length){b.innerText=pin[i];b.classList.add("filled");b.classList.remove("error")}
    else{b.innerText="-";b.classList.remove("filled","error")}
  }
}
function showPasswordModal(){
  if(unlocked) return;
  document.getElementById("password-overlay").classList.add("show");
}

function hidePasswordModal(){
  document.getElementById("password-overlay").classList.remove("show");
}

// Click ra ngoài modal để đóng
document.getElementById("password-overlay").addEventListener("click", function(e){
  if(e.target === this) hidePasswordModal();
});
function checkPassword(){if(pin===PASSWORD)unlockSafe();else wrongPassword()}
function wrongPassword(){
  document.getElementById("hint").classList.add("show");
  for(let i=0;i<4;i++)document.getElementById("pin"+i).classList.add("error");
  setTimeout(function(){pin="";updatePin();document.getElementById("hint").classList.remove("show")},700);
}
function unlockSafe(){
  unlocked=true;
  hidePasswordModal();
  if(window._triggerRiveOpen) window._triggerRiveOpen();
  document.getElementById("safe-wrapper").classList.add("open");
}
function openLetter(){
  if(openedLetter)return;
  openedLetter=true;
  document.getElementById("safe-screen").classList.remove("active");
  document.getElementById("letter-screen").classList.add("active");
  startEnvelope();
}
function startEnvelope(){
  const wrapper = document.getElementById("envelope-wrapper");
  wrapper.classList.remove("open");
  document.getElementById("paper-content").innerHTML="";
  document.getElementById("next-button").classList.remove("show");
  // Mở nắp
  setTimeout(()=>{ wrapper.classList.add("open"); }, 300);
  // Bắt đầu gõ chữ sau khi letter trượt lên
  setTimeout(()=>{ showPage(0); }, 1200);
}
function showPage(page){
  currentPage=page;typing=true;fullText=PAGES[page];typingIndex=0;
  const content=document.getElementById("paper-content");
  content.innerHTML="";
  const button=document.getElementById("next-button");
  button.classList.remove("show");
  document.getElementById("page-number").innerText=(page+1)+" / "+PAGES.length;
  button.innerText=page==PAGES.length-1?"Xong":"Tiếp";
  typeWriter();
}
function typeWriter(){
  const content=document.getElementById("paper-content");
  content.innerHTML=fullText.substring(0,typingIndex)+'<span class="cursor"></span>';
  if(typingIndex<fullText.length){typingIndex++;typingTimer=setTimeout(typeWriter,25)}
  else{typing=false;content.innerHTML=fullText;document.getElementById("next-button").classList.add("show")}
}
document.getElementById("paper-content").onclick=function(){
  if(!typing)return;
  clearTimeout(typingTimer);typing=false;
  document.getElementById("paper-content").innerHTML=fullText;
  document.getElementById("next-button").classList.add("show");
};
document.getElementById("next-button").onclick=function(){
  if(typing)return;
  if(currentPage<PAGES.length-1)showPage(currentPage+1);
  else finishStory();
};
function finishStory(){
  document.getElementById("letter-screen").classList.remove("active");
  document.getElementById("safe-screen").classList.add("active");
  document.getElementById("safe-letter").style.display = "none";
}
/* ===== TUYẾT RƠI ===== */
(function(){
  function initSnow(canvasId, count, minR, maxR, minSpeed, maxSpeed, opacity){
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');
    let W, H, flakes=[];

    function resize(){
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function rand(a,b){ return a + Math.random()*(b-a); }

    for(let i=0;i<count;i++){
      flakes.push({
        x: rand(0,W), y: rand(-H,0),
        r: rand(minR,maxR),
        speed: rand(minSpeed,maxSpeed),
        drift: rand(-0.4,0.4),
        opacity: rand(opacity*0.5, opacity)
      });
    }

    function draw(){
      ctx.clearRect(0,0,W,H);
      flakes.forEach(f=>{
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(220,240,255,${f.opacity})`;
        ctx.fill();

        f.y += f.speed;
        f.x += f.drift;

        if(f.y > H+10){
          f.y = -10;
          f.x = rand(0,W);
        }
        if(f.x > W+10) f.x = -10;
        if(f.x < -10) f.x = W+10;
      });
      requestAnimationFrame(draw);
    }
    draw();
  }

  // Bông nhỏ — phía sau két (z-index thấp)
  initSnow('snow-back', 80, 1, 2.5, 0.5, 1.2, 0.45);
  // Bông to — phía trước két (z-index cao)
  initSnow('snow-front', 30, 3, 5.5, 1.2, 2.2, 0.75);
})();

  let anim = null;
  
  window.addEventListener('load', function(){
    anim = lottie.loadAnimation({
      container: document.getElementById('lottie-box'),
      renderer: 'svg',
      loop: false,
      autoplay: false,
      animationData: animData
    });
    // Dừng ở frame đầu
    anim.goToAndStop(0, true);
  });

  window._triggerRiveOpen = function(){
    if(!anim) return;
    anim.loop = false;
    anim.play();
    // Đợi animation rương mở xong (~1.4s) rồi hiện lá thư trượt lên
    anim.addEventListener('complete', function(){
      setTimeout(function(){
        const letter = document.getElementById('safe-letter');
        if(letter) letter.classList.add('show');
        // Mờ dần rương
        setTimeout(function(){
          const box = document.getElementById('lottie-box');
          if(box) box.classList.add('fade-out');
        }, 400);
      }, 300);
    });
  };
})();
